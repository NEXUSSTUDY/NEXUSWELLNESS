name: Build Web APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install & Build
        run: |
          npm install
          npm run build
          
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: nexus-build
          path: dist/
