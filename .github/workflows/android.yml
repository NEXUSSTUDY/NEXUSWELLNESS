name: Build Web APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Latest stable version use kar rahe hain
          cache: 'npm'

      - name: Clean and Install Dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install --include=dev
          
      - name: Build Project
        run: npm run build
          
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: nexus-build
          path: dist/
