name: Build Web APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fix Structure & Install
        run: |
          # Folder structure theek karna
          mkdir -p src
          # Agar App.tsx bahar hai, toh use src ke andar copy karke main.tsx bana do
          if [ -f "App.tsx" ]; then cp App.tsx src/main.tsx; fi
          
          # Dependencies install
          npm install --force
          
      - name: Build Project
        run: |
          # Vite build ko force mode mein chalana
          npm run build
          
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: nexus-build
          path: dist/
